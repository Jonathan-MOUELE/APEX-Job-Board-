<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entreprises qui recrutent — APEX by AVERS</title>
  <meta name="description" content="Découvrez les entreprises qui recrutent en France. Parcourez les offres par secteur et postulez directement.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg) } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px) } to { opacity:1; transform:translateY(0) } }
    .spin { animation: spin 1s linear infinite; }

    :root {
      --bg: #fafafa;
      --surface: #fff;
      --surface2: #f4f4f5;
      --border: #e4e4e7;
      --text: #0c0c0d;
      --muted: #71717a;
      --orange: #f97316;
      --orange-dark: #ea6c10;
      --orange-light: #fff7ed;
      --blue: #0ea5e9;
      --blue-light: #e0f2fe;
      --shadow: 0 1px 3px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --font: 'DM Sans', system-ui, sans-serif;
    }

    html.dark {
      --bg: #09090b;
      --surface: #18181b;
      --surface2: #1f1f22;
      --border: #27272a;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --orange-light: #1c1208;
      --blue-light: #0a1929;
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: 58px; display: flex; align-items: center;
      padding: 0 32px; gap: 8px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    header.scrolled { box-shadow: 0 2px 16px rgba(0,0,0,0.08); background: var(--surface); }

    .logo-wrap { display: flex; align-items: center; gap: 6px; text-decoration: none; flex-shrink: 0; }
    .logo-apex { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
    .logo-apex span { color: var(--orange); }
    .logo-by {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px;
    }

    nav { display: flex; gap: 2px; margin-left: 28px; flex: 1; }
    .nav-link {
      font-size: 14px; font-weight: 500; color: var(--muted);
      text-decoration: none; padding: 6px 11px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .nav-link:hover, .nav-link.active { color: var(--text); background: var(--surface2); }

    .header-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }

    .btn-ghost {
      height: 34px; padding: 0 14px; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); font-family: var(--font);
      font-size: 13px; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      text-decoration: none; white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-ghost:hover { background: var(--surface2); }

    .btn-solid {
      height: 34px; padding: 0 16px; border-radius: 7px; border: none;
      background: var(--orange); color: #fff; font-family: var(--font);
      font-size: 13px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      text-decoration: none; transition: opacity 0.15s;
    }
    .btn-solid:hover { opacity: 0.88; }

    .btn-icon-sm {
      width: 34px; height: 34px; border-radius: 7px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s;
    }
    .btn-icon-sm:hover { color: var(--text); }
    .btn-icon-sm svg, .btn-ghost svg, .btn-solid svg { width: 14px; height: 14px; }

    .vr { width: 1px; height: 20px; background: var(--border); }

    /* ── PAGE ── */
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 90px 32px 80px; }
    .page-title { font-size: clamp(28px, 4vw, 42px); font-weight: 700; letter-spacing: -1.5px; margin-bottom: 8px; }
    .page-sub { font-size: 15px; color: var(--muted); margin-bottom: 32px; }

    /* ── SEARCH BAR ── */
    .search-bar { display: flex; gap: 10px; margin-bottom: 36px; flex-wrap: wrap; }
    .search-bar input {
      flex: 1; min-width: 200px; height: 42px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 14px; font-family: var(--font); font-size: 14px;
      background: var(--surface); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .search-bar input:focus { border-color: var(--orange); }

    .search-bar select {
      height: 42px; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 0 12px; font-family: var(--font); font-size: 14px;
      background: var(--surface); color: var(--text); cursor: pointer;
    }
    .search-bar button {
      height: 42px; padding: 0 20px; background: var(--orange); color: #fff;
      border: none; border-radius: 10px; font-family: var(--font);
      font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .search-bar button:hover { opacity: 0.88; }
    .search-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── GRID ── */
    .companies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .company-card {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 20px;
      display: flex; flex-direction: column; align-items: center;
      gap: 10px; transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      cursor: pointer; text-align: center;
      animation: fadeUp 0.3s ease-out both;
    }
    .company-card:hover { border-color: var(--orange); box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .company-logo-box {
      width: 64px; height: 64px; border-radius: 14px; overflow: hidden;
      background: var(--surface2); display: flex; align-items: center;
      justify-content: center; font-size: 18px; font-weight: 700;
      color: #fff; flex-shrink: 0;
    }
    .company-logo-box img { width: 100%; height: 100%; object-fit: contain; }
    .company-name { font-size: 15px; font-weight: 700; color: var(--text); }
    .company-sector { font-size: 12px; color: var(--muted); margin-top: -4px; }

    .company-actions { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
    .company-actions button {
      font-size: 11px; font-weight: 700; padding: 5px 10px;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      cursor: pointer; display: flex; align-items: center; gap: 4px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      font-family: var(--font);
    }
    .company-actions button:hover { border-color: var(--orange); color: var(--orange); }
    .company-actions button.btn-linkedin { color: #0077b5; border-color: rgba(0,119,181,0.3); }
    .company-actions button.btn-linkedin:hover { background: rgba(0,119,181,0.08); border-color: #0077b5; }
    .company-actions button.btn-offres { color: var(--orange); border-color: rgba(249,115,22,0.3); }
    .company-actions button.btn-offres:hover { background: var(--orange-light); border-color: var(--orange); }

    /* ── SECTOR FILTER ── */
    .sector-filter { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 24px; }
    .sfchip {
      font-size: 13px; font-weight: 500; color: var(--muted);
      padding: 5px 12px; border: 1px solid var(--border);
      border-radius: 100px; background: var(--surface);
      cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 4px;
    }
    .sfchip:hover, .sfchip.active { border-color: var(--orange); color: var(--orange); background: var(--orange-light); }
    .sfchip svg { width: 12px; height: 12px; }

    .results-count { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

    .loading-state { text-align: center; padding: 60px 20px; color: var(--muted); }

    /* ── TOAST ── */
    .apex-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1.5px solid var(--orange); color: var(--text);
      padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 700;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18); z-index: 99999;
      display: flex; align-items: center; gap: 10px; max-width: 90vw;
      opacity: 0; transition: opacity .25s, transform .25s;
    }
    .apex-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      header { padding: 0 16px; }
      nav { display: none; }
      .page-wrap { padding: 80px 16px 60px; }
      .search-bar { flex-direction: column; }
      .search-bar input, .search-bar select, .search-bar button { width: 100%; min-width: unset; }
      .companies-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .company-card { padding: 14px; }
      .company-logo-box { width: 48px; height: 48px; border-radius: 10px; }
      .company-name { font-size: 13px; }
      .company-actions button { font-size: 10px; padding: 4px 8px; }
      .header-right .btn-ghost span, .header-right .btn-solid span { display: none; }
    }

    @media (max-width: 480px) {
      .companies-grid { grid-template-columns: 1fr; }
      .page-title { font-size: 24px; }
    }
  </style>
</head>

<body>
  <header role="banner" id="site-header">
    <a href="index.html" class="logo-wrap" aria-label="APEX — Accueil">
      <span class="logo-apex">APE<span>X</span></span>
      <span class="logo-by">by AVERS</span>
    </a>
    <nav aria-label="Navigation principale">
      <a href="index.html#offres" class="nav-link">Offres</a>
      <a href="entreprises.html" class="nav-link active">Entreprises</a>
      <a href="index.html#outils" class="nav-link">Outils</a>
      <a href="index.html#conseils" class="nav-link">Conseils</a>
    </nav>
    <div class="header-right">
      <button class="btn-icon-sm" onclick="toggleTheme()" id="theme-btn" title="Basculer le mode sombre" aria-label="Basculer mode sombre">
        <i data-lucide="moon"></i>
      </button>
      <div class="vr"></div>
      <a href="index.html" class="btn-ghost"><i data-lucide="arrow-left"></i> <span>Retour</span></a>
      <a href="register.html" class="btn-solid"><i data-lucide="user-plus"></i> <span>Créer un compte</span></a>
    </div>
  </header>

  <main class="page-wrap" id="main">
    <div class="sec-eye"
      style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--orange);margin-bottom:8px">
      Annuaire</div>
    <h1 class="page-title">Entreprises qui recrutent</h1>
    <p class="page-sub">Toutes les entreprises actives sur France Travail — données chargées en temps réel.</p>

    <div class="search-bar">
      <input type="text" id="co-search" placeholder="Nom d'entreprise, secteur..." aria-label="Rechercher une entreprise"
        oninput="filterCompanies()">
      <select id="co-sector" aria-label="Secteur" onchange="filterCompanies()">
        <option value="">Tous les secteurs</option>
        <option value="tech">Tech & IT</option>
        <option value="sante">Santé</option>
        <option value="btp">BTP / Construction</option>
        <option value="commerce">Commerce / Retail</option>
        <option value="finance">Finance / Banque</option>
        <option value="industrie">Industrie</option>
        <option value="logistique">Logistique</option>
        <option value="restauration">Restauration / Hôtellerie</option>
        <option value="media">Médias / Communication</option>
        <option value="public">Secteur public</option>
      </select>
      <button onclick="loadFromFT()" id="btn-refresh" aria-label="Actualiser les entreprises">
        <i data-lucide="refresh-cw" style="width:14px;height:14px"></i> Actualiser
      </button>
    </div>

    <div class="sector-filter" id="sector-filter">
      <span class="sfchip active" onclick="setSector('')">Tous</span>
      <span class="sfchip" onclick="setSector('tech')"><i data-lucide="monitor"></i> Tech</span>
      <span class="sfchip" onclick="setSector('sante')"><i data-lucide="heart"></i> Santé</span>
      <span class="sfchip" onclick="setSector('finance')"><i data-lucide="landmark"></i> Finance</span>
      <span class="sfchip" onclick="setSector('industrie')"><i data-lucide="factory"></i> Industrie</span>
      <span class="sfchip" onclick="setSector('commerce')"><i data-lucide="shopping-bag"></i> Commerce</span>
      <span class="sfchip" onclick="setSector('logistique')"><i data-lucide="truck"></i> Logistique</span>
      <span class="sfchip" onclick="setSector('btp')"><i data-lucide="hard-hat"></i> BTP</span>
      <span class="sfchip" onclick="setSector('restauration')"><i data-lucide="utensils"></i> Restauration</span>
    </div>

    <div class="results-count" id="results-count"></div>
    <div class="companies-grid" id="companies-grid">
      <div class="loading-state">
        <i data-lucide="loader-2" class="spin" style="width:32px;height:32px"></i>
        <p style="margin-top:12px">Chargement des entreprises...</p>
      </div>
    </div>
  </main>

  <script>
    const API = 'http://localhost:5191';

    // ── Utilities ────────────────────────────────────────────
    function safeIcons() {
      if (typeof lucide !== 'undefined') lucide.createIcons();
      else setTimeout(safeIcons, 80);
    }
    document.addEventListener('DOMContentLoaded', safeIcons);

    function decodeUtf8Safe(str) {
      if (!str || typeof str !== 'string') return str || '';
      try { return decodeURIComponent(escape(str)); } catch(e) {}
      return str
        .replace(/Ã©/g,'é').replace(/Ã¨/g,'è').replace(/Ã /g,'à')
        .replace(/Ã¢/g,'â').replace(/Ã®/g,'î').replace(/Ã´/g,'ô')
        .replace(/Ã¹/g,'ù').replace(/Ã»/g,'û').replace(/Ã§/g,'ç')
        .replace(/Ã‰/g,'É').replace(/Ãª/g,'ê')
        .replace(/Ã¢â€šÂ¬/g,'€').replace(/â‚¬/g,'€')
        .replace(/Â°/g,'°');
    }

    function escH(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function showToast(msg, type) {
      const old = document.getElementById('apex-toast-el');
      if (old) old.remove();
      const t = document.createElement('div');
      t.id = 'apex-toast-el';
      t.className = 'apex-toast';
      const colors = { success: '#22c55e', warn: '#f59e0b', info: 'var(--orange)', error: '#ef4444' };
      t.style.borderColor = colors[type] || colors.info;
      t.textContent = msg;
      document.body.appendChild(t);
      requestAnimationFrame(() => t.classList.add('show'));
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3200);
    }

    // ── Theme ────────────────────────────────────────────────
    function initTheme() {
      const dark = localStorage.getItem('apex_theme') === 'dark';
      document.documentElement.classList.toggle('dark', dark);
      updateThemeBtn(dark);
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('apex_theme', isDark ? 'dark' : 'light');
      updateThemeBtn(isDark);
      safeIcons();
    }
    function updateThemeBtn(isDark) {
      const btn = document.getElementById('theme-btn');
      if (btn) btn.innerHTML = isDark ? '<i data-lucide="sun"></i>' : '<i data-lucide="moon"></i>';
    }
    initTheme();

    window.addEventListener('scroll', () => {
      document.getElementById('site-header').classList.toggle('scrolled', window.scrollY > 8);
    }, { passive: true });

    // ── Sector Detection (heuristic from search keywords) ───
    const SECTOR_MAP = {
      'tech': ['développeur','dev','informatique','digital','numérique','it','web','cloud','cyber','data','logiciel','réseau'],
      'sante': ['infirmier','médecin','pharmacien','aide-soignant','santé','médical','hospitalier','kiné','dentiste','sage-femme'],
      'finance': ['comptable','banque','finance','audit','assurance','crédit','trésorier','analyste financier','contrôleur de gestion'],
      'commerce': ['commercial','vendeur','magasin','retail','vente','chef de rayon','caissier','conseiller de vente','merchandiser'],
      'btp': ['chantier','maçon','bâtiment','btp','conducteur de travaux','électricien','plombier','peintre','couvreur'],
      'industrie': ['ingénieur','technicien','production','usine','maintenance','qualité','automobile','aéronautique','mécanique'],
      'logistique': ['logistique','transport','chauffeur','cariste','manutentionnaire','supply chain','entrepôt','livreur','préparateur'],
      'restauration': ['cuisinier','serveur','restaurant','hôtel','chef','barman','réceptionniste','boulanger','pâtissier'],
      'media': ['marketing','communication','rédacteur','journaliste','graphiste','designer','publicité','média','community'],
      'public': ['administratif','fonctionnaire','territorial','public','agent','secrétaire','mairie','préfecture']
    };

    function detectSectorFromKeyword(keyword) {
      if (!keyword) return '';
      const kw = keyword.toLowerCase();
      for (const [sector, terms] of Object.entries(SECTOR_MAP)) {
        if (terms.some(t => kw.includes(t))) return sector;
      }
      return '';
    }

    // ── Domain resolution (intelligent heuristic) ───────────
    function resolveDomain(companyName) {
      if (!companyName) return 'entreprise.fr';
      const n = companyName.toLowerCase().trim()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      const clean = n
        .replace(/\b(sas|sarl|sa|sasu|eurl|groupe|agence|cabinet|les|la|le|l|des|du|de|et)\b/g, '')
        .replace(/[^a-z0-9]/g, '')
        .replace(/^-+|-+$/g, '');
      return (clean || n.replace(/[^a-z0-9]/g, '')) + '.fr';
    }

    // ── Brand color from name hash ──────────────────────────
    const BRAND_COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#a855f7','#ec4899','#06b6d4','#8b5cf6'];
    function brandColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) & 0xffffffff;
      return BRAND_COLORS[Math.abs(h) % BRAND_COLORS.length];
    }

    // ── Logo fallback ───────────────────────────────────────
    const _logoTried = new WeakSet();
    function logoErr(img, domain, name) {
      if (_logoTried.has(img)) {
        img.style.display = 'none';
        const fb = img.nextElementSibling;
        if (fb) { fb.style.display = 'flex'; fb.style.background = brandColor(name); }
        return;
      }
      _logoTried.add(img);
      img.src = 'https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=https://' + domain + '&size=128';
    }

    // ── State ────────────────────────────────────────────────
    let _activeSector = '';
    let _allCompanies = [];
    let _isLoading = false;

    // ── Sector chip filter ──────────────────────────────────
    function setSector(s) {
      _activeSector = s;
      document.querySelectorAll('.sfchip').forEach(c => {
        const onclick = c.getAttribute('onclick') || '';
        c.classList.toggle('active', onclick.includes("'" + s + "'"));
      });
      document.getElementById('co-sector').value = s;
      renderCompanies();
    }

    function filterCompanies() {
      _activeSector = document.getElementById('co-sector').value;
      document.querySelectorAll('.sfchip').forEach(c => {
        const onclick = c.getAttribute('onclick') || '';
        c.classList.toggle('active',
          onclick.includes("'" + _activeSector + "'") ||
          (_activeSector === '' && onclick.includes("setSector('')"))
        );
      });
      renderCompanies();
    }

    // ── Render ───────────────────────────────────────────────
    function renderCompanies() {
      const q = document.getElementById('co-search').value.toLowerCase().trim();

      const filtered = _allCompanies.filter(c => {
        const matchQ = !q || c.name.toLowerCase().includes(q) || (c.desc || '').toLowerCase().includes(q);
        const matchS = !_activeSector || c.sector === _activeSector;
        return matchQ && matchS;
      });

      document.getElementById('results-count').textContent =
        filtered.length + ' entreprise' + (filtered.length > 1 ? 's' : '') +
        ' trouvée' + (filtered.length > 1 ? 's' : '');

      const grid = document.getElementById('companies-grid');
      if (!filtered.length) {
        grid.innerHTML = '<div class="loading-state"><i data-lucide="search-x" style="width:32px;height:32px"></i><p style="margin-top:12px">Aucune entreprise trouvée.</p></div>';
        safeIcons();
        return;
      }

      grid.innerHTML = filtered.map((c, i) => {
        const initials = c.name.substring(0, 2).toUpperCase();
        const color = brandColor(c.name);
        const safeName = escH(c.name).replace(/'/g, "\\'");
        const linkedInUrl = 'https://www.linkedin.com/search/results/companies/?keywords=' + encodeURIComponent(c.name);

        return '<div class="company-card" style="animation-delay:' + (i * 0.03) + 's">' +
          '<div class="company-logo-box" style="background:' + color + '">' +
            '<img src="https://logo.clearbit.com/' + escH(c.domain) + '" alt="' + escH(c.name) + '"' +
            ' onerror="logoErr(this,\'' + escH(c.domain) + '\',\'' + safeName + '\')" loading="lazy">' +
            '<span style="display:none;color:#fff;font-size:16px;font-weight:700;width:100%;height:100%;align-items:center;justify-content:center">' + initials + '</span>' +
          '</div>' +
          '<div class="company-name">' + escH(c.name) + '</div>' +
          '<div class="company-sector">' + escH(c.desc || '') + '</div>' +
          '<div class="company-actions">' +
            '<button class="btn-offres" onclick="searchCompany(\'' + safeName + '\')" title="Voir les offres">' +
              '<i data-lucide="briefcase" style="width:11px;height:11px"></i> Offres</button>' +
            '<button class="btn-linkedin" onclick="openLinkedIn(\'' + safeName + '\')" title="Rechercher sur LinkedIn">' +
              '<i data-lucide="linkedin" style="width:11px;height:11px"></i> LinkedIn</button>' +
          '</div>' +
        '</div>';
      }).join('');
      safeIcons();
    }

    // ── Actions ──────────────────────────────────────────────
    function searchCompany(name) {
      window.location.href = 'index.html?keyword=' + encodeURIComponent(name) + '#offres';
    }

    function openLinkedIn(name) {
      window.open('https://www.linkedin.com/search/results/companies/?keywords=' + encodeURIComponent(name), '_blank', 'noopener,noreferrer');
    }

    // ── Load from API ───────────────────────────────────────
    async function loadFromFT() {
      if (_isLoading) return;
      _isLoading = true;

      const btn = document.getElementById('btn-refresh');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width:14px;height:14px"></i> Chargement...'; safeIcons(); }

      const grid = document.getElementById('companies-grid');
      grid.innerHTML = '<div class="loading-state"><i data-lucide="loader-2" class="spin" style="width:32px;height:32px"></i><p style="margin-top:12px">Chargement des entreprises depuis France Travail...</p></div>';
      safeIcons();

      const keywords = ['développeur','infirmier','commercial','bâtiment','comptable','logistique','marketing','juridique','restauration','transport','ingénieur','banque'];
      const seen = new Map();

      await Promise.allSettled(keywords.map(async kw => {
        try {
          const res = await fetch(API + '/api/jobs/search?keyword=' + encodeURIComponent(kw) + '&range=0-49');
          if (!res.ok) return;
          const data = await res.json();
          const jobs = data.results || data.items || [];
          const detectedSector = detectSectorFromKeyword(kw);

          jobs.forEach(j => {
            const rawName = (j.company || j.entreprise?.nom || '').trim();
            const name = decodeUtf8Safe(rawName);
            if (!name || name.length < 2) return;
            const key = name.toLowerCase();
            if (seen.has(key)) return;

            seen.set(key, {
              name: name,
              domain: resolveDomain(name),
              sector: detectedSector,
              desc: decodeUtf8Safe(j.location || j.lieuTravail?.libelle || '') || 'Recrute en ce moment'
            });
          });
        } catch (_) { }
      }));

      _allCompanies = Array.from(seen.values());

      // Sort alphabetically
      _allCompanies.sort((a, b) => a.name.localeCompare(b.name, 'fr'));

      renderCompanies();
      _isLoading = false;

      if (btn) { btn.disabled = false; btn.innerHTML = '<i data-lucide="refresh-cw" style="width:14px;height:14px"></i> Actualiser'; safeIcons(); }

      if (!_allCompanies.length) {
        showToast('Aucune entreprise chargée. Vérifiez que le serveur API est actif.', 'warn');
      }
    }

    // ── Init ─────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadFromFT();
    });

    // Handle ?keyword= from redirect
    const urlKw = new URLSearchParams(window.location.search).get('keyword');
    if (urlKw) {
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('co-search').value = urlKw;
      });
    }

    // ── Expose globally ─────────────────────────────────────
    window.toggleTheme = toggleTheme;
    window.setSector = setSector;
    window.filterCompanies = filterCompanies;
    window.loadFromFT = loadFromFT;
    window.searchCompany = searchCompany;
    window.openLinkedIn = openLinkedIn;
    window.logoErr = logoErr;
  </script>
</body>

</html>
