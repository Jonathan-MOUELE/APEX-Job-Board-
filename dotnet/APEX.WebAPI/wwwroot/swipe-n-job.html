<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swipe n' Job | APEX by AVERS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.383.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --orange: #f97316;
            --muted: #a1a1aa;
        }

        body {
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100dvh;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', sans-serif;
        }

        .swipe-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            z-index: 100;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
            backdrop-filter: blur(5px);
        }

        .swipe-back {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .swipe-back:hover { background: rgba(255,255,255,0.2); }

        .swipe-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .swipe-title span {
            color: var(--orange);
        }

        #swipe-container {
            height: 100dvh;
            width: 100vw;
            display: flex;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #swipe-container::-webkit-scrollbar { display: none; }

        /* PORTRAIT MODE (Vertical Reels) */
        @media (orientation: portrait) {
            #swipe-container {
                flex-direction: column;
                overflow-y: scroll;
                scroll-snap-type: y mandatory;
            }
        }

        /* LANDSCAPE MODE (Horizontal Slider) */
        @media (orientation: landscape) {
            #swipe-container {
                flex-direction: row;
                overflow-x: scroll;
                scroll-snap-type: x mandatory;
            }
        }

        .swipe-card-section {
            flex: 0 0 100dvh;
            height: 100dvh;
            width: 100vw;
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        @media (orientation: landscape) {
            .swipe-card-section {
                flex: 0 0 100vw;
            }
        }

        .card-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }

        .card-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6) contrast(1.1);
            transition: transform 0.5s ease;
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, 
                rgba(0,0,0,0.95) 0%, 
                rgba(0,0,0,0.3) 50%,
                transparent 100%);
            z-index: 1;
        }

        .bottom-info {
            position: absolute;
            left: 0;
            bottom: 0;
            right: 100px;
            padding: 40px 24px;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bottom-info > * { pointer-events: auto; }

        .company-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--orange);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .job-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.1;
            margin: 0;
        }

        .tag-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 4px 0;
        }

        .swipe-tag {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .job-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            line-height: 1.5;
            max-width: 500px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .side-actions {
            position: absolute;
            right: 20px;
            bottom: 60px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            color: #fff;
            transition: transform 0.2s;
        }

        .action-item:active { transform: scale(0.9); }

        .action-circle {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .btn-apply-circle {
            background: var(--orange);
            border-color: rgba(255,255,255,0.3);
        }

        .action-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .controls-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            backdrop-filter: blur(4px);
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="loader"></div>
    </div>

    <header class="swipe-header">
        <a href="index.html" class="swipe-back">
            <i data-lucide="arrow-left"></i>
        </a>
        <div class="swipe-title">APEX <span>Swipe</span></div>
        <div style="width:40px"></div>
    </header>

    <div id="swipe-container">
        <!-- Les offres seront injectées ici -->
    </div>

    <div class="controls-hint">Utilisez les flèches du clavier pour naviguer</div>

    <script src="js/core.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/swipe-page.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
