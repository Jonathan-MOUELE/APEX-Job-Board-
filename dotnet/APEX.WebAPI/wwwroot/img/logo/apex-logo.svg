<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Lettre A géométrique avec flèche montante intégrée -->
  <!-- Corps du A : deux jambes -->
  <path d="M4 36 L20 4 L36 36" stroke="#4f6ef7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Barre horizontale du A (coupée pour laisser place à la flèche) -->
  <path d="M10.5 26 L29.5 26" stroke="#4f6ef7" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Flèche montante intégrée dans la pointe du A -->
  <path d="M20 4 L15 11" stroke="#4f6ef7" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M20 4 L25 11" stroke="#4f6ef7" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
